# Infrastructure-only Compose file.
# Run PostgreSQL and Qdrant in Docker, then run the FastAPI backend locally.
#
# Usage:
#   docker compose -f docker-compose.infra.yaml up -d
#   backend\.venv\Scripts\python.exe backend\init_db.py
#   cd backend
#   .venv\Scripts\python.exe -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

services:
  postgres:
    image: postgres:16-alpine
    container_name: medintel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medintel}
      POSTGRES_DB: ${POSTGRES_DB:-medintel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medintel} -d ${POSTGRES_DB:-medintel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: medintel-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
