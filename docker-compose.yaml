services:
  # PostgreSQL for paper metadata
  postgres:
    image: postgres:16-alpine
    container_name: medintel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medintel}
      POSTGRES_DB: ${POSTGRES_DB:-medintel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${MEDINTEL_BIND_ADDRESS:-127.0.0.1}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medintel} -d ${POSTGRES_DB:-medintel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Qdrant vector database for semantic search
  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: medintel-qdrant
    ports:
      - "${MEDINTEL_BIND_ADDRESS:-127.0.0.1}:6333:6333"
      - "${MEDINTEL_BIND_ADDRESS:-127.0.0.1}:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # The official image does not bundle curl; use Bash's TCP check instead.
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MedIntel FastAPI backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medintel-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-medintel}:${POSTGRES_PASSWORD:-medintel}@postgres:5432/${POSTGRES_DB:-medintel}
      MEDINTEL_QDRANT_URL: ${MEDINTEL_QDRANT_URL:-http://qdrant:6333}
      MEDINTEL_QDRANT_COLLECTION: ${MEDINTEL_QDRANT_COLLECTION:-papers}
      MEDINTEL_EMBEDDING_MODEL: ${MEDINTEL_EMBEDDING_MODEL:-BAAI/bge-m3}
      MEDINTEL_SECRET_KEY: ${MEDINTEL_SECRET_KEY:-change-me-in-production}
      MEDINTEL_SECURE_COOKIES: ${MEDINTEL_SECURE_COOKIES:-false}
      MEDINTEL_ENV: ${MEDINTEL_ENV:-development}
      MEDINTEL_ALLOWED_ORIGINS: ${MEDINTEL_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      MEDINTEL_ADMIN_EMAILS: ${MEDINTEL_ADMIN_EMAILS:-}
      MEDINTEL_ENABLE_DOCS: ${MEDINTEL_ENABLE_DOCS:-true}
      MEDINTEL_RESET_URL: ${MEDINTEL_RESET_URL:-http://localhost:3000/reset-password}
      MEDINTEL_PIPELINE_VERSION: ${MEDINTEL_PIPELINE_VERSION:-2026-07-14.2}
      MEDINTEL_REQUIRE_CURRENT_PIPELINE: ${MEDINTEL_REQUIRE_CURRENT_PIPELINE:-true}
    ports:
      - "${MEDINTEL_BIND_ADDRESS:-127.0.0.1}:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot indexing job.
  # Run manually after papers exist in PostgreSQL:
  #   docker compose run --rm index-embeddings
  index-embeddings:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-medintel}:${POSTGRES_PASSWORD:-medintel}@postgres:5432/${POSTGRES_DB:-medintel}
      MEDINTEL_QDRANT_URL: ${MEDINTEL_QDRANT_URL:-http://qdrant:6333}
      MEDINTEL_QDRANT_COLLECTION: ${MEDINTEL_QDRANT_COLLECTION:-papers}
      MEDINTEL_EMBEDDING_MODEL: ${MEDINTEL_EMBEDDING_MODEL:-BAAI/bge-m3}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    command: >
      python -m backend.index_embeddings --batch-size 100
    profiles:
      - indexing

volumes:
  postgres_data:
  qdrant_data:
